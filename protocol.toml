# Sigil Protocol Specification
#
# Machine-readable definition of the Sigil v2 protocol.
# Used by shroudb-codegen to generate typed client libraries in any language.

[protocol]
name = "sigil"
version = "2.0.0"
description = "Schema-driven credential envelope engine"
default_tcp_port = 6499
default_http_port = 6500
uri_schemes = ["sigil://", "sigil+tls://"]
uri_format = "{scheme}[token@]host[:port]"

[protocol.wire_format]
type = "resp3"
request_format = "array_of_bulk_strings"
success_envelope = "json_bulk_string"
error_envelope = "simple_error"

[protocol.http]
base_path = "/sigil"
content_type = "application/json"

# ─── Error codes ──────────────────────────────────────────────────────────────

[error_codes.SCHEMA_NOT_FOUND]
description = "Schema does not exist"
http_equiv = 404

[error_codes.SCHEMA_EXISTS]
description = "Schema already exists"
http_equiv = 409

[error_codes.SCHEMA_VALIDATION]
description = "Schema definition is invalid"
http_equiv = 400

[error_codes.ENTITY_NOT_FOUND]
description = "Entity does not exist"
http_equiv = 404

[error_codes.ENTITY_EXISTS]
description = "Entity already exists"
http_equiv = 409

[error_codes.MISSING_FIELD]
description = "Required field missing from request"
http_equiv = 400

[error_codes.INVALID_FIELD]
description = "Field value is invalid or field cannot be updated via this path"
http_equiv = 400

[error_codes.VERIFICATION_FAILED]
description = "Credential verification failed (wrong password)"
http_equiv = 401

[error_codes.ACCOUNT_LOCKED]
description = "Account locked after too many failed attempts. Only emitted for credential fields whose CredentialPolicy carries a non-null LockoutPolicy."
http_equiv = 429

[error_codes.INVALID_TOKEN]
description = "Token is invalid, expired, or revoked"
http_equiv = 401

[error_codes.TOKEN_REUSE]
description = "Refresh token reuse detected — entire family revoked"
http_equiv = 401

[error_codes.CAPABILITY_MISSING]
description = "Required engine capability not available (e.g., Cipher for PII fields)"
http_equiv = 503

[error_codes.IMPORT_FAILED]
description = "Password import failed (invalid hash format)"
http_equiv = 400

# ─── Commands ─────────────────────────────────────────────────────────────────

# ── Schema ────────────────────────────────────────────────────────────────────

[commands.SCHEMA_REGISTER]
syntax = "SCHEMA REGISTER <name> <json>"
description = "Register a credential envelope schema"
parameters = [
    { name = "name", type = "string", required = true, description = "Schema name (used as namespace prefix)" },
    { name = "json", type = "json", required = true, description = "Schema definition: fields with type and kind" },
]
response = { status = "string", version = "integer" }
http = { method = "POST", path = "/sigil/schemas", request_body = "Schema" }

[commands.SCHEMA_GET]
syntax = "SCHEMA GET <name>"
description = "Get a schema definition by name"
parameters = [
    { name = "name", type = "string", required = true },
]
response = "Schema"
http = { method = "GET", path = "/sigil/schemas/{name}" }

[commands.SCHEMA_LIST]
syntax = "SCHEMA LIST"
description = "List all registered schema names"
parameters = []
response = "array<string>"

[commands.SCHEMA_ALTER]
syntax = "SCHEMA ALTER <name> ADD <field_json> | SCHEMA ALTER <name> REMOVE <field_name>"
description = "Add or remove fields from a schema, producing a new version. Added fields are optional (required=false). Existing envelopes remain readable."
parameters = [
    { name = "name", type = "string", required = true, description = "Schema name" },
    { name = "action", type = "string", required = true, description = "ADD or REMOVE" },
    { name = "field_json", type = "json", required = false, description = "FieldDef JSON (for ADD)" },
    { name = "field_name", type = "string", required = false, description = "Field name to remove (for REMOVE)" },
]
response = { status = "string", name = "string", version = "integer", fields = "integer" }
http = { method = "PATCH", path = "/sigil/schemas/{name}" }

# ── Envelope (generic) ───────────────────────────────────────────────────────

[commands.ENVELOPE_CREATE]
syntax = "ENVELOPE CREATE <schema> <id> <json>"
description = "Create an envelope with field routing per schema kind"
parameters = [
    { name = "schema", type = "string", required = true },
    { name = "id", type = "string", required = true, description = "Entity ID" },
    { name = "json", type = "json", required = true, description = "Field name-value pairs" },
]
response = { status = "string", entity_id = "string", fields = "map", created_at = "integer" }
http = { method = "POST", path = "/sigil/{schema}/envelopes", request_body = "CreateEnvelopeBody" }

[commands.ENVELOPE_GET]
syntax = "ENVELOPE GET <schema> <id>"
description = "Get an envelope record"
parameters = [
    { name = "schema", type = "string", required = true },
    { name = "id", type = "string", required = true },
]
response = { entity_id = "string", fields = "map", created_at = "integer", updated_at = "integer" }
http = { method = "GET", path = "/sigil/{schema}/envelopes/{id}" }

[commands.ENVELOPE_IMPORT]
syntax = "ENVELOPE IMPORT <schema> <id> <json>"
description = "Import an envelope with pre-hashed credential fields. Non-credential fields processed normally."
parameters = [
    { name = "schema", type = "string", required = true },
    { name = "id", type = "string", required = true, description = "Entity ID" },
    { name = "json", type = "json", required = true, description = "Field name-value pairs (credential values are hashes, not plaintext)" },
]
response = { status = "string", entity_id = "string", fields = "map", created_at = "integer" }
http = { method = "POST", path = "/sigil/{schema}/envelopes/import", request_body = "CreateEnvelopeBody" }

[commands.ENVELOPE_UPDATE]
syntax = "ENVELOPE UPDATE <schema> <id> <json>"
description = "Update non-credential fields on an existing envelope"
parameters = [
    { name = "schema", type = "string", required = true },
    { name = "id", type = "string", required = true },
    { name = "json", type = "json", required = true, description = "Field name-value pairs to update" },
]
response = { status = "string", entity_id = "string", fields = "map", updated_at = "integer" }
http = { method = "PATCH", path = "/sigil/{schema}/envelopes/{id}", request_body = "UpdateEnvelopeBody" }

[commands.ENVELOPE_DELETE]
syntax = "ENVELOPE DELETE <schema> <id>"
description = "Delete an envelope and all associated data"
parameters = [
    { name = "schema", type = "string", required = true },
    { name = "id", type = "string", required = true },
]
response = { status = "string" }
http = { method = "DELETE", path = "/sigil/{schema}/envelopes/{id}" }

[commands.ENVELOPE_VERIFY]
syntax = "ENVELOPE VERIFY <schema> <id> <field> <value>"
description = "Verify a credential field on an envelope by explicit field name"
parameters = [
    { name = "schema", type = "string", required = true },
    { name = "id", type = "string", required = true },
    { name = "field", type = "string", required = true, description = "Name of the credential field to verify" },
    { name = "value", type = "string", required = true, description = "Plaintext value to verify against" },
]
response = { status = "string", valid = "boolean" }
http = { method = "POST", path = "/sigil/{schema}/envelopes/verify", request_body = "EnvelopeVerifyBody" }

[commands.ENVELOPE_LOOKUP]
syntax = "ENVELOPE LOOKUP <schema> <field> <value>"
description = "Look up an envelope by indexed or searchable field value. Returns the matched entity ID only."
parameters = [
    { name = "schema", type = "string", required = true },
    { name = "field", type = "string", required = true, description = "Name of the indexed/searchable field" },
    { name = "value", type = "string", required = true, description = "Value to search for" },
]
response = { status = "string", entity_id = "string" }
http = { method = "POST", path = "/sigil/{schema}/envelopes/lookup", request_body = "EnvelopeLookupBody" }

# ── Credential (generic) ─────────────────────────────────────────────────────

[commands.CREDENTIAL_CHANGE]
syntax = "CREDENTIAL CHANGE <schema> <id> <field> <old> <new>"
description = "Change a credential field (requires old value for verification)"
parameters = [
    { name = "schema", type = "string", required = true },
    { name = "id", type = "string", required = true },
    { name = "field", type = "string", required = true, description = "Name of the credential field" },
    { name = "old", type = "string", required = true },
    { name = "new", type = "string", required = true },
]
response = { status = "string" }
http = { method = "POST", path = "/sigil/{schema}/credentials/change", request_body = "CredentialChangeBody" }

[commands.CREDENTIAL_RESET]
syntax = "CREDENTIAL RESET <schema> <id> <field> <new>"
description = "Force-reset a credential field without requiring old value (admin/reset token)"
parameters = [
    { name = "schema", type = "string", required = true },
    { name = "id", type = "string", required = true },
    { name = "field", type = "string", required = true, description = "Name of the credential field" },
    { name = "new", type = "string", required = true },
]
response = { status = "string" }
http = { method = "POST", path = "/sigil/{schema}/credentials/reset", request_body = "CredentialResetBody" }

[commands.CREDENTIAL_IMPORT]
syntax = "CREDENTIAL IMPORT <schema> <id> <field> <hash> [META <json>]"
description = "Import a pre-hashed credential (bcrypt, scrypt, argon2). Transparently rehashed to Argon2id on next verify."
parameters = [
    { name = "schema", type = "string", required = true },
    { name = "id", type = "string", required = true },
    { name = "field", type = "string", required = true, description = "Name of the credential field" },
    { name = "hash", type = "string", required = true, description = "PHC string or bcrypt format" },
    { name = "meta", type = "json", required = false },
]
response = { status = "string", algorithm = "string" }
http = { method = "POST", path = "/sigil/{schema}/credentials/import", request_body = "CredentialImportBody" }

# ── User (sugar — infers credential field from schema) ───────────────────────

[commands.USER_CREATE]
syntax = "USER CREATE <schema> <id> <json>"
description = "Sugar: create an envelope. Equivalent to ENVELOPE CREATE."
parameters = [
    { name = "schema", type = "string", required = true },
    { name = "id", type = "string", required = true, description = "User ID" },
    { name = "json", type = "json", required = true, description = "Field name-value pairs" },
]
response = { status = "string", entity_id = "string", fields = "map", created_at = "integer" }
http = { method = "POST", path = "/sigil/{schema}/users", request_body = "CreateUserBody" }

[commands.USER_GET]
syntax = "USER GET <schema> <id>"
description = "Sugar: get an envelope. Equivalent to ENVELOPE GET."
parameters = [
    { name = "schema", type = "string", required = true },
    { name = "id", type = "string", required = true },
]
response = { entity_id = "string", fields = "map", created_at = "integer", updated_at = "integer" }
http = { method = "GET", path = "/sigil/{schema}/users/{id}" }

[commands.USER_IMPORT]
syntax = "USER IMPORT <schema> <id> <json>"
description = "Sugar: import an envelope with pre-hashed credentials. Equivalent to ENVELOPE IMPORT."
parameters = [
    { name = "schema", type = "string", required = true },
    { name = "id", type = "string", required = true, description = "User ID" },
    { name = "json", type = "json", required = true, description = "Field name-value pairs (credential values are hashes, not plaintext)" },
]
response = { status = "string", entity_id = "string", fields = "map", created_at = "integer" }
http = { method = "POST", path = "/sigil/{schema}/users/import", request_body = "CreateUserBody" }

[commands.USER_UPDATE]
syntax = "USER UPDATE <schema> <id> <json>"
description = "Sugar: update non-credential fields. Equivalent to ENVELOPE UPDATE."
parameters = [
    { name = "schema", type = "string", required = true },
    { name = "id", type = "string", required = true },
    { name = "json", type = "json", required = true, description = "Field name-value pairs to update" },
]
response = { status = "string", entity_id = "string", fields = "map", updated_at = "integer" }
http = { method = "PATCH", path = "/sigil/{schema}/users/{id}", request_body = "UpdateUserBody" }

[commands.USER_DELETE]
syntax = "USER DELETE <schema> <id>"
description = "Sugar: delete an envelope. Equivalent to ENVELOPE DELETE."
parameters = [
    { name = "schema", type = "string", required = true },
    { name = "id", type = "string", required = true },
]
response = { status = "string" }
http = { method = "DELETE", path = "/sigil/{schema}/users/{id}" }

[commands.USER_VERIFY]
syntax = "USER VERIFY <schema> <id> <password>"
description = "Sugar: verify credential. Infers the credential field from schema. Equivalent to ENVELOPE VERIFY with implicit field."
parameters = [
    { name = "schema", type = "string", required = true },
    { name = "id", type = "string", required = true },
    { name = "password", type = "string", required = true },
]
response = { status = "string", valid = "boolean" }
http = { method = "POST", path = "/sigil/{schema}/verify", request_body = "VerifyBody" }

[commands.USER_LOOKUP]
syntax = "USER LOOKUP <schema> <field> <value>"
description = "Sugar: look up by indexed or searchable field value. Equivalent to ENVELOPE LOOKUP."
parameters = [
    { name = "schema", type = "string", required = true },
    { name = "field", type = "string", required = true, description = "Name of the indexed/searchable field" },
    { name = "value", type = "string", required = true, description = "Value to search for" },
]
response = { status = "string", entity_id = "string" }
http = { method = "POST", path = "/sigil/{schema}/lookup", request_body = "LookupBody" }

# ── Session ───────────────────────────────────────────────────────────────────

[commands.SESSION_CREATE]
syntax = "SESSION CREATE <schema> <id> <password> [META <json>]"
description = "Verify credentials and issue access + refresh tokens. Fields annotated with claim=true are auto-included in the JWT from the entity's envelope. Enriched claim values override caller-provided META for the same key."
parameters = [
    { name = "schema", type = "string", required = true },
    { name = "id", type = "string", required = true, description = "Entity ID" },
    { name = "password", type = "string", required = true },
    { name = "meta", type = "json", required = false, description = "Extra claims to merge into access token" },
]
response = { status = "string", access_token = "string", refresh_token = "string", expires_in = "integer" }
http = { method = "POST", path = "/sigil/{schema}/sessions", request_body = "LoginBody" }

[commands.SESSION_LOGIN]
syntax = "SESSION LOGIN <schema> <field> <value> <password> [META <json>]"
description = "Verify credentials by indexed field value (e.g., email) and issue access + refresh tokens. Same claim enrichment as SESSION CREATE."
parameters = [
    { name = "schema", type = "string", required = true },
    { name = "field", type = "string", required = true, description = "Name of the indexed field to look up" },
    { name = "value", type = "string", required = true, description = "Indexed field value" },
    { name = "password", type = "string", required = true },
    { name = "meta", type = "json", required = false, description = "Extra claims to merge into access token" },
]
response = { status = "string", access_token = "string", refresh_token = "string", expires_in = "integer" }
http = { method = "POST", path = "/sigil/{schema}/sessions/login", request_body = "FieldLoginBody" }

[commands.SESSION_REFRESH]
syntax = "SESSION REFRESH <schema> <token>"
description = "Rotate refresh token and issue new access token. Fields annotated with claim=true are re-read from the entity's current envelope, so refreshed tokens reflect the latest values (e.g. role changes)."
parameters = [
    { name = "schema", type = "string", required = true },
    { name = "token", type = "string", required = true, description = "Current refresh token" },
]
response = { status = "string", access_token = "string", refresh_token = "string", expires_in = "integer" }
http = { method = "POST", path = "/sigil/{schema}/sessions/refresh", request_body = "RefreshBody" }

[commands.SESSION_REVOKE]
syntax = "SESSION REVOKE <schema> <token>"
description = "Revoke a single refresh token (logout one session)"
parameters = [
    { name = "schema", type = "string", required = true },
    { name = "token", type = "string", required = true },
]
response = { status = "string" }
http = { method = "DELETE", path = "/sigil/{schema}/sessions", request_body = "RevokeBody (refresh_token)" }

[commands.SESSION_REVOKE_ALL]
syntax = "SESSION REVOKE ALL <schema> <id>"
description = "Revoke all sessions for an entity (logout everywhere)"
parameters = [
    { name = "schema", type = "string", required = true },
    { name = "id", type = "string", required = true, description = "Entity ID" },
]
response = { status = "string", revoked = "integer" }
http = { method = "DELETE", path = "/sigil/{schema}/sessions", request_body = "RevokeBody (entity_id)" }

[commands.SESSION_LIST]
syntax = "SESSION LIST <schema> <id>"
description = "List active sessions for an entity"
parameters = [
    { name = "schema", type = "string", required = true },
    { name = "id", type = "string", required = true, description = "Entity ID" },
]
response = "array<SessionRecord>"
http = { method = "GET", path = "/sigil/{schema}/sessions/{entity_id}" }

# ── Password (sugar — infers credential field from schema) ───────────────────

[commands.PASSWORD_CHANGE]
syntax = "PASSWORD CHANGE <schema> <id> <old> <new>"
description = "Sugar: change password. Infers credential field from schema. Equivalent to CREDENTIAL CHANGE with implicit field."
parameters = [
    { name = "schema", type = "string", required = true },
    { name = "id", type = "string", required = true },
    { name = "old", type = "string", required = true },
    { name = "new", type = "string", required = true },
]
response = { status = "string" }
http = { method = "POST", path = "/sigil/{schema}/password/change", request_body = "ChangePasswordBody" }

[commands.PASSWORD_RESET]
syntax = "PASSWORD RESET <schema> <id> <new>"
description = "Sugar: force-reset password. Infers credential field from schema. Equivalent to CREDENTIAL RESET with implicit field."
parameters = [
    { name = "schema", type = "string", required = true },
    { name = "id", type = "string", required = true },
    { name = "new", type = "string", required = true },
]
response = { status = "string" }
http = { method = "POST", path = "/sigil/{schema}/password/reset", request_body = "ResetPasswordBody" }

[commands.PASSWORD_IMPORT]
syntax = "PASSWORD IMPORT <schema> <id> <hash> [META <json>]"
description = "Sugar: import pre-hashed password. Infers credential field from schema. Equivalent to CREDENTIAL IMPORT with implicit field."
parameters = [
    { name = "schema", type = "string", required = true },
    { name = "id", type = "string", required = true },
    { name = "hash", type = "string", required = true, description = "PHC string or bcrypt format" },
    { name = "meta", type = "json", required = false },
]
response = { status = "string", algorithm = "string" }
http = { method = "POST", path = "/sigil/{schema}/password/import", request_body = "ImportPasswordBody" }

# ── JWT ───────────────────────────────────────────────────────────────────────

[commands.JWKS]
syntax = "JWKS <schema>"
description = "Get the JSON Web Key Set for external token verification"
parameters = [
    { name = "schema", type = "string", required = true },
]
response = "JWKS"
http = { method = "GET", path = "/sigil/{schema}/.well-known/jwks.json" }

# ── Operational ───────────────────────────────────────────────────────────────

[commands.AUTH]
syntax = "AUTH <token>"
description = "Authenticate the current TCP connection with a bearer token. Handled at the connection layer, not dispatched to the engine. HTTP transport uses the Authorization: Bearer header instead."
parameters = [
    { name = "token", type = "string", required = true, description = "Bearer token validated by the configured TokenValidator" },
]
response = { status = "string" }

[commands.HEALTH]
syntax = "HEALTH"
description = "Health check"
parameters = []
response = { status = "string" }
http = { method = "GET", path = "/sigil/health" }

[commands.PING]
syntax = "PING"
description = "Ping-pong connectivity test"
parameters = []
response = { status = "string" }
http = { method = "GET", path = "/sigil/ping" }

# ─── Types ────────────────────────────────────────────────────────────────────

[types.Schema]
description = "A registered credential envelope schema"
fields = [
    { name = "name", type = "string", description = "Schema name" },
    { name = "version", type = "integer", default = 1, description = "Schema version (increments on ALTER)" },
    { name = "fields", type = "array<FieldDef>", description = "Field definitions" },
]

[types.FieldDef]
description = "A field in a credential schema"
fields = [
    { name = "name", type = "string" },
    { name = "field_type", type = "string", description = "string | integer | boolean | bytes" },
    { name = "kind", type = "FieldKind", description = "Cryptographic treatment variant. Internally tagged on `type`." },
    { name = "required", type = "boolean", default = true, description = "Whether this field is required on envelope creation. Fields added via ALTER are optional." },
]

[types.FieldKind]
description = "Cryptographic treatment for a field. Tagged-union: exactly one variant per field. Internally tagged on `type` (values: `inert` | `index` | `credential` | `pii` | `secret`)."
variants = [
    { type = "inert", description = "Stored as-is. No crypto treatment.", fields = [
        { name = "claim", type = "ClaimPolicy", required = false, description = "Auto-include this field's value in JWT claims on session create/refresh." },
    ] },
    { type = "index", description = "Plaintext lookup index.", fields = [
        { name = "claim", type = "ClaimPolicy", required = false, description = "Auto-include this field's value in JWT claims on session create/refresh." },
    ] },
    { type = "credential", description = "Hashed + verified via CredentialPolicy.algorithm. Never returned by ENVELOPE GET.", fields = [
        { name = "algorithm", type = "string", default = "argon2id", description = "argon2id (default) | sha256 (for high-entropy machine credentials) | argon2i | argon2d | bcrypt | scrypt (import-only legacy)" },
        { name = "min_length", type = "integer", required = false, description = "None resolves to DEFAULT_MIN_LENGTH=8, or SHA256_MIN_LENGTH=32 for sha256." },
        { name = "max_length", type = "integer", required = false, description = "None resolves to DEFAULT_MAX_LENGTH=128." },
        { name = "lockout", type = "LockoutPolicy", required = false, description = "Presence of this struct enables failed-attempt lockout on this field. Absent (null) means no lockout. Absent is the right choice for machine-auth credentials where lockout is a denial-of-service vector." },
    ] },
    { type = "pii", description = "Encrypted at rest via Cipher. Optionally blind-indexed via Veil.", fields = [
        { name = "searchable", type = "boolean", default = false, description = "Add blind-index entries via Veil." },
    ] },
    { type = "secret", description = "Versioned storage via Keep. Sigil never reads back.", fields = [
        { name = "rotation_days", type = "integer", required = false, description = "Advisory rotation interval in days." },
    ] },
]

[types.CredentialPolicy]
description = "Per-field credential policy embedded in the `credential` FieldKind variant. Replaces the v1 engine-global PasswordPolicy."
fields = [
    { name = "algorithm", type = "string", default = "argon2id", description = "argon2id | sha256 (machine credentials, requires min_length >= 32) | argon2i | argon2d | bcrypt | scrypt (legacy import-only)" },
    { name = "min_length", type = "integer", required = false, description = "None resolves to DEFAULT_MIN_LENGTH=8, or SHA256_MIN_LENGTH=32 for sha256." },
    { name = "max_length", type = "integer", required = false, description = "None resolves to DEFAULT_MAX_LENGTH=128." },
    { name = "lockout", type = "LockoutPolicy", required = false, description = "Presence enables lockout; absent (null) disables." },
]

[types.LockoutPolicy]
description = "Failed-attempt lockout settings for a credential field."
fields = [
    { name = "max_attempts", type = "integer", description = "Threshold after which the field is locked. Must be > 0." },
    { name = "duration_secs", type = "integer", description = "Lockout duration in seconds. Must be > 0." },
]

[types.PiiPolicy]
description = "Settings for the `pii` FieldKind variant."
fields = [
    { name = "searchable", type = "boolean", default = false, description = "Add blind-index entries via Veil (requires Veil capability)." },
]

[types.SecretPolicy]
description = "Settings for the `secret` FieldKind variant."
fields = [
    { name = "rotation_days", type = "integer", required = false, description = "Advisory rotation interval in days." },
]

[types.ClaimPolicy]
description = "JWT-claim inclusion settings. Only valid on `inert` and `index` FieldKind variants."
fields = [
    { name = "as_name", type = "string", required = false, description = "If set, the JWT claim is emitted under this key instead of the field name (e.g., `as_name = \"sub\"` to emit an index field as the JWT subject)." },
]

[types.EngineResourceConfig]
description = "Engine-wide resource limits. Replaces the v1 PasswordPolicy."
fields = [
    { name = "max_concurrent_hashes", type = "integer", default = 4, description = "Semaphore size bounding concurrent Argon2id hashes. Prevents credential-hash DoS." },
]

[enums.PasswordAlgorithm]
description = "Credential hashing algorithm. Chosen per-field via CredentialPolicy.algorithm."
variants = [
    { name = "argon2id", description = "Default. Memory-hard KDF for human credentials (passwords, PINs, recovery keys)." },
    { name = "sha256", description = "Unkeyed SHA-256 with constant-time compare. For high-entropy machine credentials (e.g., 256-bit CSPRNG-generated API keys). Requires min_length >= 32. Deliberately not HMAC — see DOCS.md rationale." },
    { name = "argon2i", description = "Import-only legacy. Transparently rehashed to argon2id on next successful verify." },
    { name = "argon2d", description = "Import-only legacy. Transparently rehashed to argon2id on next successful verify." },
    { name = "bcrypt", description = "Import-only legacy. Transparently rehashed to argon2id on next successful verify." },
    { name = "scrypt", description = "Import-only legacy. Transparently rehashed to argon2id on next successful verify." },
]

[types.SessionRecord]
description = "An active session (refresh token family)"
fields = [
    { name = "family_id", type = "string" },
    { name = "generation", type = "integer" },
    { name = "created_at", type = "integer" },
    { name = "expires_at", type = "integer" },
]

[types.JWKS]
description = "JSON Web Key Set returned by the JWKS command. Shape follows RFC 7517."
fields = [
    { name = "keys", type = "array<JWK>", description = "Public keys (active + draining) for external JWT verification." },
]
